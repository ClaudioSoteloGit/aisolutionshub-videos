<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#020617">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <meta name="apple-mobile-web-app-title" content="AI Video Studio">
  <title>AI Solutions HUB Video Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #020617;
      --bg-card: rgba(15, 23, 42, 0.8);
      --primary: #2DD4BF;
      --primary-dark: #14B8A6;
      --accent: #2563EB;
      --text: #F8FAFC;
      --text-muted: #94A3B8;
      --text-dim: #64748B;
      --border: rgba(45, 212, 191, 0.15);
      --border-focus: rgba(45, 212, 191, 0.4);
      --radius: 16px;
      --radius-sm: 12px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg);
      min-height: 100vh; min-height: 100dvh;
      color: var(--text);
      overflow-x: hidden;
    }

    .bg-glow {
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background:
        radial-gradient(ellipse 80% 50% at 50% -20%, rgba(45, 212, 191, 0.08), transparent),
        radial-gradient(ellipse 60% 40% at 80% 100%, rgba(37, 99, 235, 0.06), transparent);
    }

    .app {
      position: relative; z-index: 1;
      max-width: 520px;
      margin: 0 auto;
      padding: 24px 16px 32px;
      min-height: 100vh; min-height: 100dvh;
      display: flex; flex-direction: column;
    }

    /* Header */
    .header { text-align: center; margin-bottom: 28px; }
    .logo { display: inline-flex; align-items: center; gap: 10px; margin-bottom: 6px; }
    .logo-icon {
      width: 36px; height: 36px; border-radius: 10px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 900; color: var(--bg);
    }
    .logo-text { font-size: 17px; font-weight: 700; letter-spacing: -0.02em; }
    .logo-text span { color: var(--primary); }
    .tagline { color: var(--text-muted); font-size: 13px; }

    /* Prompt */
    .prompt-box {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px; margin-bottom: 16px;
      backdrop-filter: blur(12px);
      transition: all 0.3s ease;
    }
    .prompt-box:focus-within {
      border-color: var(--border-focus);
      box-shadow: 0 0 0 3px rgba(45, 212, 191, 0.1), 0 8px 32px rgba(0,0,0,0.3);
    }
    .prompt-label {
      font-size: 12px; font-weight: 600; color: var(--text-muted);
      margin-bottom: 8px; display: flex; align-items: center; gap: 6px;
    }
    .mic-btn {
      width: 28px; height: 28px; border-radius: 50%;
      background: rgba(45, 212, 191, 0.15); border: 1px solid rgba(45, 212, 191, 0.3);
      display: inline-flex; align-items: center; justify-content: center;
      cursor: pointer; transition: all 0.2s ease; margin-left: auto;
      font-size: 14px;
    }
    .mic-btn.listening {
      background: rgba(239, 68, 68, 0.2); border-color: rgba(239, 68, 68, 0.5);
      animation: pulse-mic 1s ease infinite;
    }
    @keyframes pulse-mic {
      0%, 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.3); }
      50% { box-shadow: 0 0 0 8px rgba(239, 68, 68, 0); }
    }
    #mainPrompt {
      width: 100%; background: transparent; border: none;
      color: var(--text); font-size: 15px; font-family: 'Inter', sans-serif;
      font-weight: 500; line-height: 1.6; resize: none; outline: none;
      min-height: 80px;
    }
    #mainPrompt::placeholder { color: var(--text-dim); }

    /* Quick templates */
    .quick-templates {
      display: flex; gap: 6px; flex-wrap: wrap;
      margin-bottom: 16px;
    }
    .quick-btn {
      padding: 7px 12px;
      background: rgba(45, 212, 191, 0.06);
      border: 1px solid rgba(45, 212, 191, 0.1);
      border-radius: 100px;
      color: var(--text-muted); font-size: 11px; font-weight: 500;
      cursor: pointer; transition: all 0.2s ease;
      font-family: 'Inter', sans-serif; white-space: nowrap;
    }
    .quick-btn:active { transform: scale(0.95); }
    .quick-btn:hover { background: rgba(45, 212, 191, 0.15); color: var(--primary); }

    /* Generate */
    .generate-btn {
      width: 100%; padding: 16px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      border: none; border-radius: var(--radius-sm);
      color: var(--bg); font-size: 15px; font-weight: 800;
      font-family: 'Inter', sans-serif; cursor: pointer;
      transition: all 0.3s ease;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      margin-bottom: 20px;
    }
    .generate-btn:active:not(:disabled) { transform: scale(0.98); }
    .generate-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .generate-btn .spinner {
      width: 18px; height: 18px;
      border: 2px solid rgba(2, 6, 23, 0.3);
      border-top-color: var(--bg);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      display: none;
    }
    .generate-btn.loading .spinner { display: block; }
    .generate-btn.loading .btn-text { display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Progress */
    .progress-panel {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 16px;
      display: none; margin-bottom: 16px;
    }
    .progress-panel.active { display: block; }
    .progress-header { display: flex; justify-content: space-between; margin-bottom: 10px; }
    .progress-title { font-weight: 600; font-size: 13px; }
    .progress-stats { font-size: 11px; color: var(--text-dim); display: flex; gap: 10px; }
    .progress-bar { height: 4px; background: rgba(45, 212, 191, 0.08); border-radius: 2px; overflow: hidden; margin-bottom: 8px; }
    .progress-fill {
      height: 100%; background: linear-gradient(90deg, var(--primary), var(--accent));
      border-radius: 2px; width: 0%; transition: width 0.3s ease;
    }
    .progress-status { font-size: 11px; color: var(--text-dim); text-align: center; }

    /* Preview */
    .preview-container { text-align: center; display: none; margin-bottom: 16px; }
    .preview-container.active { display: block; }
    #videoCanvas {
      width: 100%; max-width: 260px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: #000;
    }

    /* Download */
    .download-section {
      background: rgba(16, 185, 129, 0.08);
      border: 1px solid rgba(16, 185, 129, 0.3);
      border-radius: var(--radius); padding: 16px;
      text-align: center; display: none; margin-bottom: 16px;
    }
    .download-section.active { display: block; }
    .download-title { color: #10B981; font-size: 15px; font-weight: 700; margin-bottom: 4px; }
    .download-info { color: var(--text-muted); font-size: 12px; margin-bottom: 12px; }
    .download-btn {
      display: inline-block; padding: 12px 28px;
      background: #10B981; color: var(--bg);
      border-radius: 8px; text-decoration: none;
      font-weight: 700; font-size: 14px;
    }
    .reset-btn {
      margin-top: 8px; background: transparent;
      border: 1px solid var(--border); color: var(--text-dim);
      padding: 8px 18px; border-radius: 8px;
      cursor: pointer; font-size: 12px; font-family: 'Inter', sans-serif;
    }

    .footer {
      text-align: center; margin-top: auto; padding-top: 16px;
      border-top: 1px solid rgba(45, 212, 191, 0.06);
      color: var(--text-dim); font-size: 10px;
    }

    /* Voice indicator */
    .voice-indicator {
      display: none; align-items: center; justify-content: center; gap: 8px;
      padding: 10px; margin-bottom: 12px;
      background: rgba(239, 68, 68, 0.08);
      border: 1px solid rgba(239, 68, 68, 0.2);
      border-radius: var(--radius-sm);
      font-size: 13px; color: #fca5a5;
    }
    .voice-indicator.active { display: flex; }
    .voice-bars { display: flex; gap: 3px; align-items: center; height: 18px; }
    .voice-bars span {
      width: 3px; background: #ef4444; border-radius: 2px;
      animation: voice-bar 0.8s ease infinite;
    }
    .voice-bars span:nth-child(1) { height: 8px; animation-delay: 0s; }
    .voice-bars span:nth-child(2) { height: 14px; animation-delay: 0.1s; }
    .voice-bars span:nth-child(3) { height: 10px; animation-delay: 0.2s; }
    .voice-bars span:nth-child(4) { height: 18px; animation-delay: 0.3s; }
    .voice-bars span:nth-child(5) { height: 8px; animation-delay: 0.4s; }
    @keyframes voice-bar {
      0%, 100% { transform: scaleY(0.5); }
      50% { transform: scaleY(1.5); }
    }

    /* Responsive */
    @media (max-width: 480px) {
      .app { padding: 16px 12px 24px; }
      .header { margin-bottom: 20px; }
      .logo-text { font-size: 15px; }
      #mainPrompt { font-size: 14px; min-height: 70px; }
      .quick-btn { padding: 6px 10px; font-size: 10px; }
      .generate-btn { padding: 14px; font-size: 14px; }
      #videoCanvas { max-width: 220px; }
    }

    @media (min-width: 768px) {
      .app { max-width: 600px; padding: 32px 24px; }
      #mainPrompt { font-size: 16px; min-height: 100px; }
      .quick-btn { padding: 8px 14px; font-size: 12px; }
      .generate-btn { padding: 18px; font-size: 16px; }
      #videoCanvas { max-width: 300px; }
    }
  </style>
</head>
<body>
  <div class="bg-glow"></div>
  <div class="app">
    <header class="header">
      <div class="logo">
        <div class="logo-icon">AI</div>
        <span class="logo-text">AI Solutions HUB <span>Video Studio</span></span>
      </div>
      <p class="tagline">Describe tu video. Nosotros lo creamos.</p>
    </header>

    <div class="voice-indicator" id="voiceIndicator">
      <div class="voice-bars"><span></span><span></span><span></span><span></span><span></span></div>
      Escuchando...
    </div>

    <div class="prompt-box">
      <div class="prompt-label">
        Tu marca
      </div>
      <input type="text" id="brandName" placeholder="Nombre de tu empresa" style="width:100%;background:transparent;border:none;color:var(--text);font-size:15px;font-family:'Inter',sans-serif;font-weight:500;outline:none;padding:4px 0;" value="">
    </div>

    <div class="prompt-box">
      <div class="prompt-label">
        Describe tu video
        <div class="mic-btn" id="micBtn" onclick="toggleVoice()">🎤</div>
      </div>
      <textarea id="mainPrompt" placeholder="Ej: 5 beneficios de automatizar con IA: 70% menos costos, operaciones 24/7, cero errores. CTA: Descubre más en tuempresa.com"></textarea>
    </div>

    <div class="quick-templates">
      <button class="quick-btn" onclick="setTemplate('benefits')">✨ Beneficios</button>
      <button class="quick-btn" onclick="setTemplate('promo')">📢 Promo</button>
      <button class="quick-btn" onclick="setTemplate('tutorial')">🎓 Tutorial</button>
      <button class="quick-btn" onclick="setTemplate('testimonial')">💬 Testimonial</button>
    </div>

    <button class="generate-btn" id="generateBtn" onclick="generateVideo()">
      <div class="spinner"></div>
      <span class="btn-text">✨ Generar Video</span>
    </button>

    <div class="progress-panel" id="progressPanel">
      <div class="progress-header">
        <span class="progress-title" id="progressTitle">Generando...</span>
        <div class="progress-stats">
          <span id="statFrame">0/0</span>
          <span id="statTime">0s</span>
        </div>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
      <div class="progress-status" id="progressStatus">Inicializando...</div>
    </div>

    <div class="preview-container" id="previewContainer">
      <canvas id="videoCanvas"></canvas>
    </div>

    <div class="download-section" id="downloadSection">
      <div class="download-title">✅ Video Listo!</div>
      <div class="download-info" id="downloadInfo"></div>
      <a id="downloadLink" class="download-btn" download>Descargar Video</a>
      <br>
      <button class="reset-btn" onclick="resetForm()">Crear Otro</button>
    </div>

    <footer class="footer">
      Powered by AISolutionsHub • 100% gratis
    </footer>
  </div>

  <script>
    let isRendering = false, isListening = false, recognition = null;

    // Voice
    function initVoice() {
      const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SR) return;
      recognition = new SR();
      recognition.lang = 'es-ES';
      recognition.continuous = true;
      recognition.interimResults = true;
      recognition.onresult = (e) => {
        let t = '';
        for (let i = e.resultIndex; i < e.results.length; i++) t += e.results[i][0].transcript;
        const ta = document.getElementById('mainPrompt');
        if (e.results[e.results.length - 1].isFinal) ta.value += (ta.value ? ' ' : '') + t;
        else ta.placeholder = t;
      };
      recognition.onerror = () => stopVoice();
      recognition.onend = () => { if (isListening) recognition.start(); };
    }
    function toggleVoice() { isListening ? stopVoice() : startVoice(); }
    function startVoice() {
      if (!recognition) { alert('Tu navegador no soporta voz'); return; }
      isListening = true;
      document.getElementById('micBtn').classList.add('listening');
      document.getElementById('voiceIndicator').classList.add('active');
      recognition.start();
    }
    function stopVoice() {
      isListening = false;
      document.getElementById('micBtn').classList.remove('listening');
      document.getElementById('voiceIndicator').classList.remove('active');
      if (recognition) recognition.stop();
    }
    initVoice();

    // Templates
    const TEMPLATES = {
      benefits: 'LinkedIn | 5 beneficios de automatizar con IA: 70% menos costos, operaciones 24/7, cero errores humanos, de horas a segundos, consistencia 100% | CTA: Descubre más en tuempresa.com',
      promo: 'Instagram | Deja de perder 3 horas diarias en tareas manuales: setup en 5 minutos, IA inteligente, seguridad enterprise | CTA: Empieza gratis en tuempresa.com',
      tutorial: 'YouTube | 3 pasos para automatizar tu negocio: conecta tus herramientas, define reglas, deja que la IA trabaje | CTA: Pruébalo gratis en tuempresa.com',
      testimonial: 'LinkedIn | Cómo ahorramos 20 horas semanales: 70% menos costos, equipo enfocado en estrategia, resultados desde día 1 | CTA: Únete a miles de empresas en tuempresa.com'
    };
    function setTemplate(t) { document.getElementById('mainPrompt').value = TEMPLATES[t]; }

    // Parse
    function parsePrompt(prompt) {
      const parts = prompt.split('|').map(p => p.trim()).filter(p => p);
      let platform = 'tiktok', hook = 'Transform Your Business Today', features = [], ctaText = 'Learn More', ctaUrl = 'yourwebsite.com';

      parts.forEach((part, i) => {
        const lower = part.toLowerCase();
        if (lower.includes('linkedin')) platform = 'linkedin';
        else if (lower.includes('tiktok')) platform = 'tiktok';
        else if (lower.includes('instagram')) platform = 'instagram';
        else if (lower.includes('youtube')) platform = 'youtube';
        else if (lower.includes('twitter')) platform = 'twitter';

        if (lower.startsWith('cta') || lower.includes('cta:')) {
          const cc = part.replace(/cta[:\s]*/i, '').trim();
          const um = cc.match(/en\s+([\w.-]+\.\w+)/i);
          if (um) { ctaUrl = um[1]; ctaText = cc.replace(/en\s+[\w.-]+\.\w+/i, '').trim(); }
          else ctaText = cc.substring(0, 30);
          return;
        }
        if (i === 1) { const s = part.split(/[,;]/).filter(s => s.trim().length > 10); if (s.length > 0) hook = s[0].trim().substring(0, 80); }

        const ci = part.match(/([^:,]+):\s*([^,]+)/g);
        if (ci) {
          ci.forEach(item => {
            const [title, ...dp] = item.split(':');
            const desc = dp.join(':').trim();
            if (title.trim().length > 2 && title.trim().length < 40) {
              const icons = ['⚡', '🤖', '🔒', '🎯', '💰', '🔄', '✅', '🚀'];
              features.push({ icon: icons[features.length % icons.length], title: title.trim().substring(0, 35), desc: desc.substring(0, 70) || 'Key benefit' });
            }
          });
        }
        if (features.length === 0) {
          const items = part.split(/[,;]/).filter(s => s.trim().length > 10 && s.trim().length < 80);
          const icons = ['⚡', '🤖', '🔒', '🎯', '💰', '🔄', '✅', '🚀'];
          items.slice(0, 4).forEach((item, idx) => {
            features.push({ icon: icons[idx % icons.length], title: item.trim().substring(0, 30), desc: item.trim().substring(30, 70) || 'Key benefit' });
          });
        }
      });

      while (features.length < 2) {
        const d = [{ icon: '⚡', title: 'Instant Setup', desc: 'Ready in minutes' }, { icon: '🤖', title: 'Smart Automation', desc: 'AI-powered workflows' }];
        features.push(d[features.length]);
      }

      const brandName = document.getElementById('brandName')?.value?.trim() || 'Your Brand';

      return {
        brandName,
        platform,
        hook,
        features: features.slice(0, 4),
        cta: {
          headline: 'Ready to get started?',
          subtitle: 'Take the first step today',
          text: ctaText,
          url: ctaUrl
        },
        duration: 15
      };
    }

    // Render
    async function generateVideo() {
      const prompt = document.getElementById('mainPrompt').value.trim();
      if (!prompt) { alert('Describe tu video primero'); return; }
      if (isRendering) return;

      const config = parsePrompt(prompt);
      const btn = document.getElementById('generateBtn');
      btn.classList.add('loading'); btn.disabled = true;
      document.getElementById('progressPanel').classList.add('active');
      document.getElementById('previewContainer').classList.add('active');
      document.getElementById('downloadSection').classList.remove('active');

      const isVertical = ['instagram', 'tiktok', 'youtube'].includes(config.platform);
      const width = isVertical ? 720 : 1280, height = isVertical ? 1280 : 720;
      const fps = 30, duration = config.duration, totalFrames = fps * duration;

      const canvas = document.getElementById('videoCanvas');
      canvas.width = width; canvas.height = height;
      const ctx = canvas.getContext('2d');

      let mimeType = 'video/webm;codecs=vp9';
      if (!MediaRecorder.isTypeSupported(mimeType)) mimeType = 'video/webm;codecs=vp8';
      if (!MediaRecorder.isTypeSupported(mimeType)) mimeType = 'video/webm';

      const stream = canvas.captureStream(fps);
      const mr = new MediaRecorder(stream, { mimeType, videoBitsPerSecond: 5000000 });
      const chunks = [];
      mr.ondataavailable = (e) => { if (e.data.size > 0) chunks.push(e.data); };
      mr.onstop = () => {
        const blob = new Blob(chunks, { type: 'video/webm' });
        const sizeMB = (blob.size / 1024 / 1024).toFixed(2);
        const url = URL.createObjectURL(blob);
        document.getElementById('downloadLink').href = url;
        document.getElementById('downloadLink').download = `video-${config.platform}-${Date.now()}.webm`;
        document.getElementById('downloadInfo').textContent = `${config.platform.toUpperCase()} • ${duration}s • ${sizeMB}MB`;
        document.getElementById('downloadSection').classList.add('active');
        document.getElementById('progressTitle').textContent = '✅ Completo!';
        document.getElementById('progressStatus').textContent = `Video guardado: ${sizeMB}MB`;
        btn.classList.remove('loading'); btn.disabled = false; isRendering = false;
      };

      mr.start(100); isRendering = true;
      const startTime = performance.now();

      function drawFrame() {
        const elapsed = (performance.now() - startTime) / 1000;
        const frame = Math.floor(elapsed * fps);
        const progress = Math.min(frame / totalFrames, 1);
        if (frame >= totalFrames) { mr.stop(); document.getElementById('progressFill').style.width = '100%'; document.getElementById('progressStatus').textContent = 'Finalizando...'; return; }
        document.getElementById('progressFill').style.width = `${progress * 100}%`;
        document.getElementById('statFrame').textContent = `${frame}/${totalFrames}`;
        document.getElementById('statTime').textContent = `${elapsed.toFixed(1)}s`;
        document.getElementById('progressStatus').textContent = `Renderizando... ${Math.round(progress * 100)}%`;
        drawScene(ctx, width, height, frame, totalFrames, config);
        requestAnimationFrame(drawFrame);
      }
      requestAnimationFrame(drawFrame);
    }

    // ===== CINEMATIC RENDERER =====
    const BRAND = { primary: '#2DD4BF', secondary: '#14B8A6', accent: '#2563EB', bg: '#0F172A', text: '#F8FAFC', muted: '#94A3B8' };

    function drawScene(ctx, w, h, frame, totalFrames, config) {
      // Dark cinematic background
      const g = ctx.createRadialGradient(w/2, h/2, 0, w/2, h/2, Math.max(w, h) * 0.7);
      g.addColorStop(0, BRAND.bg); g.addColorStop(1, '#000000');
      ctx.fillStyle = g; ctx.fillRect(0, 0, w, h);

      // Film grain
      ctx.globalAlpha = 0.03;
      for (let i = 0; i < 100; i++) {
        ctx.fillStyle = Math.random() > 0.5 ? '#fff' : '#000';
        ctx.fillRect(Math.random() * w, Math.random() * h, Math.random() * 2, Math.random() * 2);
      }
      ctx.globalAlpha = 1;

      // Light leak
      const llX = w * 0.8 + Math.sin(frame * 0.01) * 100;
      const llOpacity = Math.max(0, Math.sin(frame * 0.02) * 0.12);
      ctx.globalAlpha = llOpacity;
      const llg = ctx.createRadialGradient(llX, h * 0.2, 0, llX, h * 0.2, 300);
      llg.addColorStop(0, BRAND.accent); llg.addColorStop(1, 'transparent');
      ctx.fillStyle = llg; ctx.fillRect(0, 0, w, h);
      ctx.globalAlpha = 1;

      const sceneDuration = totalFrames / 5;
      const scene = Math.floor(frame / sceneDuration);
      const p = (frame % sceneDuration) / sceneDuration;
      const alpha = easeOut(p);

      if (scene === 0) drawCinematicLogo(ctx, w, h, config.brandName, alpha, frame);
      else if (scene === 1) drawCinematicHook(ctx, w, h, config.hook, alpha, frame);
      else if (scene >= 2 && scene <= 3) {
        const idx = scene - 2;
        if (config.features[idx]) drawCinematicFeature(ctx, config.features[idx], w, h, alpha, frame);
      }
      else if (scene === 4) drawCinematicCTA(ctx, config.cta, w, h, alpha, frame);
    }

    function easeOut(t) { return 1 - Math.pow(1 - t, 3); }

    function drawCinematicLogo(ctx, w, h, brandName, alpha, frame) {
      const scale = 0.85 + alpha * 0.15;
      ctx.save(); ctx.translate(w/2, h/2); ctx.scale(scale, scale); ctx.translate(-w/2, -h/2);
      ctx.globalAlpha = alpha;

      const boxSize = Math.min(w, h) * 0.15;
      const x = w/2 - boxSize/2, y = h/2 - boxSize - 30;
      const name = brandName || 'Your Brand';
      const initials = name.split(' ').map(w => w[0]).join('').substring(0, 2).toUpperCase();

      // Glow
      ctx.shadowColor = BRAND.primary; ctx.shadowBlur = 60;
      const bg = ctx.createLinearGradient(x, y, x + boxSize, y + boxSize);
      bg.addColorStop(0, BRAND.primary); bg.addColorStop(1, BRAND.accent);
      ctx.fillStyle = bg;
      roundRect(ctx, x, y, boxSize, boxSize, boxSize * 0.25);
      ctx.fill(); ctx.shadowBlur = 0;

      ctx.fillStyle = '#000'; ctx.font = `bold ${boxSize * 0.45}px Inter, sans-serif`;
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(initials, w/2, y + boxSize/2);

      ctx.fillStyle = BRAND.text; ctx.font = `bold ${Math.min(w, h) * 0.06}px Inter, sans-serif`;
      ctx.fillText(name, w/2, y + boxSize + 40);

      ctx.fillStyle = BRAND.muted; ctx.font = `${Math.min(w, h) * 0.025}px Inter, sans-serif`;
      ctx.globalAlpha = alpha * easeOut(Math.min(1, (frame % 90) / 30 * 2));
      ctx.fillText('Innovation starts here', w/2, y + boxSize + 70);
      ctx.restore(); ctx.globalAlpha = 1;
    }

    function drawCinematicHook(ctx, w, h, hook, alpha, frame) {
      // Accent line
      const lw = 60 * easeOut(Math.min(1, (frame % 90) / 15));
      ctx.fillStyle = BRAND.primary;
      ctx.fillRect(w/2 - lw/2, h * 0.35 - 20, lw, 2);

      // Word reveal
      const words = hook.split(' ');
      const wordsPerSecond = 4;
      const wordsToShow = Math.floor(((frame % 90) / 90) * (words.length + 2));
      const fontSize = Math.max(36, Math.min(w, h) * 0.055);
      const lineH = fontSize * 1.4;
      const startY = h * 0.42;
      const maxW = w * 0.85;

      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.font = `bold ${fontSize}px Inter, sans-serif`;

      let currentLine = '', lineIndex = 0;
      words.forEach((word, i) => {
        if (i >= wordsToShow) return;
        const test = currentLine + word + ' ';
        if (ctx.measureText(test).width > maxW && currentLine) {
          ctx.globalAlpha = easeOut(Math.min(1, (wordsToShow - lineIndex) * 0.5));
          ctx.fillStyle = BRAND.text;
          ctx.fillText(currentLine.trim(), w/2, startY + lineIndex * lineH);
          lineIndex++; currentLine = word + ' ';
        } else currentLine = test;
      });
      if (currentLine) { ctx.globalAlpha = 1; ctx.fillText(currentLine.trim(), w/2, startY + lineIndex * lineH); }

      ctx.globalAlpha = easeOut(Math.min(1, ((frame % 90) - 15) / 15));
      ctx.fillStyle = BRAND.muted;
      ctx.font = `${Math.max(28, Math.min(w, h) * 0.022)}px Inter, sans-serif`;
      ctx.fillText('Discover what is possible', w/2, startY + (lineIndex + 1) * lineH + 16);
      ctx.globalAlpha = 1;
    }

    function drawCinematicFeature(ctx, feature, w, h, alpha, frame) {
      const scale = 0.9 + alpha * 0.1;
      const translateY = (1 - alpha) * 40;
      ctx.save(); ctx.translate(w/2, h/2 + translateY); ctx.scale(scale, scale); ctx.translate(-w/2, -h/2);
      ctx.globalAlpha = alpha;

      const cardW = Math.min(w * 0.85, 600), cardH = Math.min(h * 0.35, 300);
      const cardX = w/2 - cardW/2, cardY = h/2 - cardH/2;

      // Glass card
      ctx.fillStyle = 'rgba(15, 23, 42, 0.7)';
      roundRect(ctx, cardX, cardY, cardW, cardH, 24); ctx.fill();
      ctx.strokeStyle = `${BRAND.primary}30`; ctx.lineWidth = 1; ctx.stroke();
      ctx.shadowColor = 'rgba(0,0,0,0.3)'; ctx.shadowBlur = 60; ctx.shadowOffsetY = 20; ctx.fill(); ctx.shadowBlur = 0; ctx.shadowOffsetY = 0;

      // Icon
      const iconSize = 72, iconX = w/2 - iconSize/2, iconY = cardY + 16;
      ctx.fillStyle = `${BRAND.primary}20`;
      roundRect(ctx, iconX, iconY, iconSize, iconSize, 18); ctx.fill();
      ctx.strokeStyle = `${BRAND.primary}40`; ctx.lineWidth = 2; ctx.stroke();
      ctx.font = '36px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(feature.icon || '✨', w/2, iconY + iconSize/2);

      // Check for stat number in title
      const numMatch = feature.title.match(/(\d+%?)/);
      if (numMatch) {
        const num = parseInt(numMatch[1]);
        const suffix = numMatch[1].replace(/[0-9]/g, '');
        const progress = Math.min(1, ((frame % 90) / 90) * 1.5);
        const displayNum = Math.floor(num * progress);
        
        ctx.fillStyle = BRAND.primary;
        ctx.font = `bold ${Math.max(48, Math.min(w, h) * 0.08)}px Inter, sans-serif`;
        ctx.fillText(`${displayNum}${suffix}`, w/2, h/2 - 10);
        
        const cleanTitle = feature.title.replace(numMatch[0], '').trim();
        if (cleanTitle) {
          ctx.fillStyle = BRAND.muted;
          ctx.font = `${Math.max(24, Math.min(w, h) * 0.03)}px Inter, sans-serif`;
          ctx.fillText(cleanTitle, w/2, h/2 + 25);
        }
      } else {
        ctx.fillStyle = BRAND.text;
        ctx.font = `bold ${Math.max(36, Math.min(w, h) * 0.04)}px Inter, sans-serif`;
        ctx.fillText(feature.title, w/2, h/2 + 20);
      }

      // Desc
      ctx.fillStyle = BRAND.muted;
      ctx.font = `${Math.max(28, Math.min(w, h) * 0.022)}px Inter, sans-serif`;
      ctx.fillText(feature.desc, w/2, h/2 + 60);

      // Progress
      const barW = cardW * 0.66, barX = w/2 - barW/2, barY = cardY + cardH - 20;
      ctx.fillStyle = `${BRAND.primary}20`; roundRect(ctx, barX, barY, barW, 3, 2); ctx.fill();
      ctx.fillStyle = BRAND.primary; roundRect(ctx, barX, barY, barW * easeOut((frame % 90) / 40), 3, 2); ctx.fill();

      ctx.restore(); ctx.globalAlpha = 1;
    }

    function drawCinematicCTA(ctx, cta, w, h, alpha, frame) {
      const scale = 0.9 + alpha * 0.1;
      const pulse = 1 + Math.sin(((frame % 90) / 90) * Math.PI * 4) * 0.02;
      ctx.save(); ctx.translate(w/2, h/2); ctx.scale(scale * pulse, scale * pulse); ctx.translate(-w/2, -h/2);
      ctx.globalAlpha = alpha;

      // Headline
      ctx.fillStyle = BRAND.text;
      ctx.font = `bold ${Math.max(36, Math.min(w, h) * 0.045)}px Inter, sans-serif`;
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(cta.headline || 'Ready to get started?', w/2, h/2 - 70);

      // Subtitle
      ctx.fillStyle = BRAND.muted;
      ctx.font = `${Math.max(24, Math.min(w, h) * 0.022)}px Inter, sans-serif`;
      ctx.fillText(cta.subtitle || 'Take the first step today', w/2, h/2 - 30);

      // Button
      const btnW = Math.min(w * 0.6, 300), btnH = 60;
      const btnX = w/2 - btnW/2, btnY = h/2;
      const bg = ctx.createLinearGradient(btnX, btnY, btnX + btnW, btnY + btnH);
      bg.addColorStop(0, BRAND.primary); bg.addColorStop(1, BRAND.accent);
      ctx.fillStyle = bg; roundRect(ctx, btnX, btnY, btnW, btnH, 14); ctx.fill();
      ctx.shadowColor = BRAND.primary; ctx.shadowBlur = 40; ctx.shadowOffsetY = 10; ctx.fill(); ctx.shadowBlur = 0; ctx.shadowOffsetY = 0;

      ctx.fillStyle = '#000';
      ctx.font = `bold ${Math.max(24, Math.min(w, h) * 0.026)}px Inter, sans-serif`;
      ctx.fillText(cta.text || 'Learn More', w/2, h/2 + 30);

      // URL
      if (cta.url) {
        ctx.fillStyle = '#64748B';
        ctx.font = `${Math.max(22, Math.min(w, h) * 0.02)}px Inter, sans-serif`;
        ctx.fillText(cta.url, w/2, h/2 + 70);
      }

      ctx.restore(); ctx.globalAlpha = 1;
    }

    function roundRect(ctx, x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y); ctx.lineTo(x + w - r, y); ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r); ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h); ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r); ctx.quadraticCurveTo(x, y, x + r, y); ctx.closePath();
    }

    function resetForm() {
      document.getElementById('downloadSection').classList.remove('active');
      document.getElementById('progressPanel').classList.remove('active');
      document.getElementById('previewContainer').classList.remove('active');
      document.getElementById('mainPrompt').value = '';
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // PWA
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(() => {});
      });
    }
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault(); deferredPrompt = e;
      const btn = document.createElement('button');
      btn.textContent = '📲 Instalar App';
      btn.style.cssText = 'position:fixed;bottom:20px;right:20px;z-index:999;padding:12px 20px;background:#2DD4BF;color:#020617;border:none;border-radius:12px;font-weight:700;font-size:14px;font-family:Inter,sans-serif;cursor:pointer;box-shadow:0 4px 20px rgba(45,212,191,0.3);';
      btn.onclick = () => { btn.style.display = 'none'; deferredPrompt.prompt(); deferredPrompt.userChoice.then(() => { deferredPrompt = null; btn.remove(); }); };
      document.body.appendChild(btn);
    });
  </script>
</body>
